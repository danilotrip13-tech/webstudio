version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: webstudio
      POSTGRES_USER: webstudio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - webstudio_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webstudio -d webstudio"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - internal

  webstudio:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      DEV_LOGIN: ${DEV_LOGIN}
    ports:
      - "5173"
    networks:
      - internal
      - dokploy-network

volumes:
  webstudio_postgres:

networks:
  internal:
  dokploy-network:
    external: true